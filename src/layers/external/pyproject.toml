[project]
name = "external"
version = "0.1.0"
description = "External packages for intelligent-gateway lambda functions"
requires-python = ">=3.11"
dependencies = [
    "ulid-py>=1.1.0",
    "boto3==1.37.28",
    "aws-lambda-powertools>=2.38.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
